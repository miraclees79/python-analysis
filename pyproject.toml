[tool.ruff]
# Celujemy w Pythona 3.11
target-version = "py311"
line-length = 100

[tool.ruff.lint]
# Wybrane grupy reguł
select = [
    "E",    # pycodestyle (błędy)
    "W",    # pycodestyle (ostrzeżenia)
    "F",    # Pyflakes (nieużywane zmienne/importy)
    "I",    # isort (sortowanie importów)
    "N",    # flake8-naming (konwencje nazw)
    "ANN",  # flake8-annotations (wymóg typowania - Twoja zasada!)
    "B",    # flake8-bugbear (najlepsze praktyki)
    "COM",  # flake8-commas (wymóg przecinków - wymusza formatowanie linia po linii)
    "ARG",  # flake8-unused-arguments (nieużywane argumenty)
    "PTH",  # flake8-use-pathlib (wymóg pathlib)
    "PL",   # Pylint (dodatkowe rygory)
]

ignore = [
    "ANN101", # Ignoruj brak typu dla 'self' w metodach klasy
    "ANN102", # Ignoruj brak typu dla 'cls' w metodach klasy
]

[tool.ruff.lint.flake8-annotations]
# Wymuszaj typowanie dla wszystkich funkcji (publicznych i prywatnych)
allow-star-arg-any = false
suppress-none-returning = false

[tool.ruff.lint.flake8-naming]
# Twoja zasada: Zakaz używania "_" jako nazwy zmiennej
# Wymuszamy, aby każda zmienna miała co najmniej 2 znaki lub nie była samym podkreślnikiem
ignore-names = []

[tool.ruff.lint.pyflakes]
# Twoja zasada: Zakaz ignorowania nieużywanych zmiennych przez "_"
# Ruff domyślnie ignoruje zmienne o nazwie "_". Poniższy regex sprawia, 
# że Ruff będzie zgłaszał błąd nawet dla samej podkreślnika (F841).
extend-variable-rgx = "^$" 

[tool.ruff.format]
# Ustawienia formatera - to one wymuszą wygląd linia po linii
quote-style = "double"
indent-style = "space"
# Wymuszaj łamanie linii przy wielu argumentach (jeśli jest przecinek na końcu)
skip-magic-trailing-comma = false