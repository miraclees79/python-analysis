[tool.ruff]
# Celujemy w Pythona 3.11
target-version = "py311"
line-length = 100

[tool.ruff.lint]
# Wybrane grupy reguł
select = [
    "E",    # pycodestyle (błędy)
    "W",    # pycodestyle (ostrzeżenia)
    "F",    # Pyflakes (nieużywane zmienne/importy)
    "I",    # isort (sortowanie importów)
    "N",    # pep8-naming (konwencje nazw)
    "ANN",  # flake8-annotations (wymóg typowania)
    "B",    # flake8-bugbear (najlepsze praktyki)
    "COM",  # flake8-commas (wymóg przecinków - wymusza formatowanie linia po linii)
    "ARG",  # flake8-unused-arguments (nieużywane argumenty)
    "PTH",  # flake8-use-pathlib (wymóg pathlib)
    "PL",   # Pylint (dodatkowe rygory)
]

ignore = [
    "ANN101", # Ignoruj brak typu dla 'self' (starsze wersje Ruff)
    "ANN102", # Ignoruj brak typu dla 'cls'
    "COM812", # Czasami koliduje z formaterem, ale zostawiamy jeśli chcesz wymuszać przecinki
]

[tool.ruff.lint.flake8-annotations]
# Wymuszaj typowanie dla wszystkich funkcji
allow-star-arg-any = false
suppress-none-returning = false

[tool.ruff.lint.pep8-naming]
# Poprawione z flake8-naming na pep8-naming
ignore-names = []

[tool.ruff.lint.pyflakes]
# Zakaz używania "_" jako nazwy zmiennej - Ruff zgłosi F841 przy przypisaniu do "_"
extend-variable-rgx = "^$" 

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
# To ustawienie w połączeniu z przecinkiem na końcu wymusza formatowanie linia po linii
skip-magic-trailing-comma = false