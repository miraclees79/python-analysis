[tool.ruff]
# Celujemy w Pythona 3.11
target-version = "py311"
line-length = 100

[tool.ruff.lint]
# Główne grupy reguł
select = [
    "F",    # Pyflakes (w tym F841 - nieużywane zmienne)
    "E",    # pycodestyle (błędy)
    "W",    # pycodestyle (ostrzeżenia)
    "I",    # isort (sortowanie importów)
    "N",    # pep8-naming (konwencje nazw)
    "ANN",  # flake8-annotations (wymóg typowania - TWOJA ZASADA)
    "B",    # flake8-bugbear (najlepsze praktyki)
    "COM",  # flake8-commas (wymóg przecinków - TWOJA ZASADA)
    "ARG",  # flake8-unused-arguments (nieużywane argumenty)
    "PTH",  # flake8-use-pathlib (pathlib zamiast os.path)
]



# TWOJA ZASADA: Zakaz używania "_" jako zmiennej "śmieciowej"
# Domyślnie Ruff ignoruje nieużywane zmienne o nazwie "_". 
# Ustawienie tego regexa na pusty ciąg (lub coś co nigdy nie wystąpi)
# sprawi, że każde "_" zostanie uznane za błąd F841 (Unused variable).
dummy-variable-rgx = "^$"

[tool.ruff.lint.flake8-annotations]
# Typowanie musi być wszędzie
allow-star-arg-any = false
suppress-none-returning = false

[tool.ruff.format]
# TWOJA ZASADA: Wypisywanie argumentów linia po linii
# Formater Ruff automatycznie rozbije linie, jeśli wykryje "magic comma" 
# (przecinek po ostatnim argumencie).
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false