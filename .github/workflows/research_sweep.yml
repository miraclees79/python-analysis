name: Research Sweep Runner - manual only

on:
  
  workflow_dispatch:  # Pozwala odpalić ręcznie

permissions:
  contents: read

jobs:
  Research_sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sweep Runner
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          # Zapisz credentials
          echo "$GOOGLE_CREDENTIALS" > /tmp/credentials.json
          # Uruchamiamy skrypt za pomocą modułu 
          python -m moj_system.scripts.sweep_optimizer --mode PENSION --n_mc 500

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-logs
          path: outputs/sweep_*.*
          
