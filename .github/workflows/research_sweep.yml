name: Research Sweep Runner - manual only

on:
  
  workflow_dispatch:  # Pozwala odpalić ręcznie

jobs:
  refresh-knf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh KNF Funds & Match
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          # Zapisz credentials
          echo "$GOOGLE_CREDENTIALS" > /tmp/credentials.json
          # Uruchamiamy skrypt za pomocą modułu (flagę --all możesz dodać, jeśli chcesz przeskanować cały rynek)
          python -m moj_system.scripts.sweep_optimizer.py --mode PENSION

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: knf-logs
          path: outputs/refresh_knf.log
