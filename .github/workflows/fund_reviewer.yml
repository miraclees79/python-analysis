name: Weekly Fund Review

on:
  schedule:
    # Uruchamia się w  piątki o 23:00 UTC
    - cron: '0 23 * * 5'
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  run-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4



      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh KNF & Generate Ranking
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "$GOOGLE_CREDENTIALS" > /tmp/credentials.json

          # 2. Następnie odpalamy rewizję funduszy z flagą --update (dociągnie KNF i wygeneruje raporty)
          python moj_system/scripts/fund_reviewer.py --update

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fund-review-logs
          path: outputs/fund_ranking_*.csv
