name: Daily Fund Data Refresh

on:
  schedule:
    # Uruchamia się   o 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  run-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4



      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh data
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "$GOOGLE_CREDENTIALS" > /tmp/credentials.json

          
          python -m moj_system.scripts.fund_data_refresher 

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fund-review-logs
          path: fund_refresh.log