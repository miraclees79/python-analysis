name: Daily OCR Data Download

on:
  schedule:
    # 2:00 UTC każdego dnia
    - cron: '0 2 * * *'
  workflow_dispatch:  # Pozwala odpalić ręcznie w razie potrzeby

permissions:
  contents: read
  actions: read

jobs:
  run-ocr:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-pol poppler-utils libgl1-mesa-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run OCR Pipeline
        env:
          ZIP_URL: ${{ secrets.ZIP_URL }}
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
          INT_FILE_NAME: ${{ secrets.INT_FILE_NAME }}
          FOLDER_NAME: ${{ secrets.FOLDER_NAME }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          # Zapisz credentials do pliku tymczasowego
          echo "$GOOGLE_CREDENTIALS" > /tmp/credentials.json
          # Uruchom nasz nowy zrefaktoryzowany skrypt OCR
          python -m moj_system.data.ocr_processor

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ocr-logs
          path: ocr_download.log