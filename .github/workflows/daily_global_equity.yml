# .github/workflows/daily_global_equity.yml
#
# Daily runner for the global equity portfolio strategy.
# Supports both "global_equity" and "msci_world" portfolio modes,
# controlled by PORTFOLIO_MODE in global_equity_daily_runfile.py.
#
# Schedule: 20:00 Warsaw time on weekdays.
#   Runs 30 minutes after the multi-asset workflow (19:30 Warsaw)
#   to avoid concurrent Drive uploads from both workflows.
#   20:00 Warsaw = 19:00 UTC (winter, UTC+1) / 18:00 UTC (summer, UTC+2).
#
# Phases run daily: 1–7 (data download, per-asset walk-forward, bond
#   walk-forward, allocation walk-forward, reporting, daily output).
#
# Outputs (all prefixed global_equity_ to coexist with other strategy files):
#   global_equity_outputs/global_equity_signal_status.txt
#   global_equity_outputs/global_equity_signal_log.csv
#   global_equity_outputs/global_equity_chart.png
#   global_equity_outputs/global_equity_signal_snapshot.json
#
# All four files are uploaded to the same Google Drive folder used by
# the other strategies.  Email notification on any action != HOLD.
#
# Required repository secrets (shared with other workflows):
#   GOOGLE_CREDENTIALS      — service account key (raw JSON)
#   GDRIVE_FOLDER_ID        — target Google Drive folder ID
#   NOTIFY_EMAIL_TO         — recipient address for signal alerts
#   GMAIL_USER              — sender Gmail address
#   GMAIL_APP_PASSWORD      — Gmail App Password
#
# Optional:
#   NOTIFY_EMAIL_CC         — CC address (leave unset to skip)

name: Daily Global Equity Signal

on:
  schedule:
    # 19:00 UTC — covers winter (UTC+1, 20:00 Warsaw)
    - cron: "0 19 * * 1-5"
    # 18:00 UTC — covers summer (UTC+2, 20:00 Warsaw)
    - cron: "0 18 * * 1-5"
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Send email even if action is HOLD"
        required: false
        default: "false"

jobs:
  run-global-equity:
    name: Run global equity strategy and deliver outputs
    runs-on: ubuntu-latest
    timeout-minutes: 360      # 6h — walk-forward on 2-core runner is slow

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Set up Python
      # ------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: global_equity/requirements.txt

      # ------------------------------------------------------------------
      # 3. Install dependencies
      # ------------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r global_equity/requirements.txt

      # ------------------------------------------------------------------
      # 4. Write Google credentials
      # ------------------------------------------------------------------
      - name: Write Google credentials file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/credentials.json

      # ------------------------------------------------------------------
      # 5. Run the global equity daily runfile
      # ------------------------------------------------------------------
      - name: Run global equity daily runfile
        id: strategy
        env:
          PYTHONIOENCODING: utf-8
          PYTHONPATH: ${{ github.workspace }}/global_equity:${{ github.workspace }}/development
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          cd global_equity
          python global_equity_daily_runfile.py

      # ------------------------------------------------------------------
      # 6. Parse action from snapshot JSON
      # ------------------------------------------------------------------
      - name: Parse signal action
        id: parse
        run: |
          SNAPSHOT="${{ github.workspace }}/global_equity/global_equity_outputs/global_equity_signal_snapshot.json"

          if [ ! -f "$SNAPSHOT" ]; then
            echo "ERROR: global_equity_signal_snapshot.json not found."
            exit 1
          fi

          python - "$SNAPSHOT" >> "$GITHUB_ENV" <<'EOF'
          import json, sys
          snap = json.load(open(sys.argv[1]))
          action = snap.get("action", "HOLD")
          mode   = snap.get("portfolio_mode", "unknown")
          print(f"GE_ACTION={action}")
          print(f"GE_MODE={mode}")
          # Signals summary
          sigs = snap.get("signals", {})
          sig_str = "  ".join(f"{k}={v}" for k, v in sigs.items())
          print(f"GE_SIGNALS={sig_str}")
          # Weights summary
          w = snap.get("weights", {})
          wt_parts = [f"{k}={v*100:.0f}%" for k, v in w.items() if k != "mmf"]
          wt_parts.append(f"MMF={w.get('mmf', 0)*100:.0f}%")
          print(f"GE_WEIGHTS={' '.join(wt_parts)}")
          EOF

          echo "GE_ACTION=$GE_ACTION"
          echo "Parsed: mode=$GE_MODE  action=$GE_ACTION  signals=$GE_SIGNALS"

      # ------------------------------------------------------------------
      # 7. Upload all four outputs to Google Drive
      # ------------------------------------------------------------------
      - name: Validate credentials JSON
        run: |
          python -c "import json; json.load(open('/tmp/credentials.json'))" \
            && echo "Credentials JSON is valid."

      - name: Upload outputs to Google Drive
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python - <<'EOF'
          import json, os
          from pathlib import Path

          creds_dict = json.load(open("/tmp/credentials.json"))
          folder_id  = os.environ["GDRIVE_FOLDER_ID"]

          from google.oauth2.service_account import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          SCOPES  = ["https://www.googleapis.com/auth/drive.file"]
          creds   = Credentials.from_service_account_info(creds_dict, scopes=SCOPES)
          service = build("drive", "v3", credentials=creds)

          FILES = [
              ("global_equity_signal_status.txt",    "text/plain"),
              ("global_equity_signal_log.csv",        "text/csv"),
              ("global_equity_chart.png",             "image/png"),
              ("global_equity_signal_snapshot.json",  "application/json"),
          ]

          out_dir = Path("global_equity/global_equity_outputs")

          for filename, mimetype in FILES:
              path = out_dir / filename
              if not path.exists():
                  print(f"SKIP (not found): {filename}", flush=True)
                  continue

              q = (
                  f"name='{filename}' and "
                  f"'{folder_id}' in parents and "
                  f"trashed=false"
              )
              results = (
                  service.files()
                  .list(q=q, fields="files(id,name)")
                  .execute()
              )
              existing = results.get("files", [])
              media    = MediaFileUpload(str(path), mimetype=mimetype, resumable=True)

              if existing:
                  file_id = existing[0]["id"]
                  service.files().update(
                      fileId=file_id, media_body=media
                  ).execute()
                  print(f"UPDATED {filename} (id={file_id})", flush=True)
              else:
                  metadata = {"name": filename, "parents": [folder_id]}
                  service.files().create(
                      body=metadata, media_body=media, fields="id"
                  ).execute()
                  print(f"CREATED {filename}", flush=True)

          print("Google Drive upload complete.", flush=True)
          EOF

      # ------------------------------------------------------------------
      # 8. Send email notification (skip if HOLD unless force_notify=true)
      # ------------------------------------------------------------------
      - name: Send email notification
        if: |
          env.GE_ACTION != 'HOLD' ||
          github.event.inputs.force_notify == 'true'
        env:
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL_TO:   ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_CC:   ${{ secrets.NOTIFY_EMAIL_CC }}
          GE_ACTION:         ${{ env.GE_ACTION }}
          GE_MODE:           ${{ env.GE_MODE }}
          GE_SIGNALS:        ${{ env.GE_SIGNALS }}
          GE_WEIGHTS:        ${{ env.GE_WEIGHTS }}
        run: |
          python - <<'EOF'
          import os, smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          action  = os.environ.get("GE_ACTION",   "HOLD")
          mode    = os.environ.get("GE_MODE",     "unknown")
          signals = os.environ.get("GE_SIGNALS",  "N/A")
          weights = os.environ.get("GE_WEIGHTS",  "N/A")
          to_addr = os.environ.get("NOTIFY_EMAIL_TO", "")
          cc_addr = os.environ.get("NOTIFY_EMAIL_CC", "")
          sender  = os.environ.get("GMAIL_USER", "")
          pwd     = os.environ.get("GMAIL_APP_PASSWORD", "")

          if not to_addr or not sender:
              print("Email not configured — skipping.", flush=True)
              exit(0)

          import datetime as dt
          today = dt.date.today().isoformat()

          subject = f"[Global Equity] {action} — {today} [{mode}]"
          body = (
              f"Global Equity Strategy Signal Update\n"
              f"{'='*50}\n"
              f"Date:     {today}\n"
              f"Mode:     {mode}\n"
              f"Action:   {action}\n"
              f"Signals:  {signals}\n"
              f"Weights:  {weights}\n"
          )

          msg = MIMEMultipart()
          msg["From"]    = sender
          msg["To"]      = to_addr
          msg["Subject"] = subject
          if cc_addr:
              msg["Cc"] = cc_addr
          msg.attach(MIMEText(body, "plain"))

          recipients = [to_addr] + ([cc_addr] if cc_addr else [])

          try:
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
                  server.login(sender, pwd)
                  server.sendmail(sender, recipients, msg.as_string())
              print(f"Email sent to {recipients}", flush=True)
          except Exception as e:
              print(f"Email failed: {e}", flush=True)
          EOF

      # ------------------------------------------------------------------
      # 9. Upload log file to workflow artifacts (always, for debugging)
      # ------------------------------------------------------------------
      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: global-equity-run-log
          path: global_equity/GlobalEquityDailyRun.log
          retention-days: 14
