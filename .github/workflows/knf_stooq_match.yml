# .github/workflows/knf_stooq_match.yml
#
# Manually triggered workflow that matches KNF subfund names against
# stooq fund names and uploads the results to Google Drive.
#
# Required secrets:
#   GOOGLE_CREDENTIALS   — service account JSON
#   GDRIVE_FOLDER_ID     — Drive folder containing input files and
#                          where output files will be written
#
# Input files expected in the Drive folder:
#   knf_summary.csv          — produced by knf_explore workflow
#   nazwy1000.csv .. 5000.csv — produced by download_nazwy sweep
#
# Output files written to the same Drive folder:
#   knf_stooq_matches.csv    — full match table
#   knf_stooq_unmatched.csv  — KNF subfunds with no match
#   knf_stooq_review.csv     — fuzzy matches scoring below 90

name: KNF-stooq Name Matching

on:
  workflow_dispatch:  
    inputs:
      fuzzy_threshold:
        description: "Minimum fuzzy match score to accept (default 75)"
        required: false
        default: "75"

jobs:
  match:
    name: Match KNF and stooq fund names
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas rapidfuzz google-auth google-api-python-client

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/credentials.json

      - name: Validate credentials
        run: |
          python -c "import json; json.load(open('/tmp/credentials.json'))" \
            && echo "Credentials JSON is valid."

      - name: Run matching script
        env:
          GDRIVE_FOLDER_ID:  ${{ secrets.GDRIVE_FOLDER_ID }}
          FUZZY_THRESHOLD:   ${{ github.event.inputs.fuzzy_threshold }}
        run: |
          python knf_explore/knf_stooq_match.py

      - name: Upload results as workflow artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: knf-stooq-match-results
          path: /tmp/knf_match/*.csv
          retention-days: 30
