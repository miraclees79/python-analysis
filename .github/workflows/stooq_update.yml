name: Stooq to GDrive Sync

on:
  schedule:
    # 23:30 UTC = ok. 00:30/01:30 czasu polskiego (Pn-Pt)
    - cron: '30 23 * * 1-5'
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright google-api-python-client google-auth-httplib2 google-auth-oauthlib
          playwright install chromium --with-deps

      - name: Run Sync Script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python data_management/stooq_to_gdrive.py