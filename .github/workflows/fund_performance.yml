# .github/workflows/fund_performance.yml
#
# Scheduled and manually triggered workflow that:
#   - Fetches KNF metadata (subfund detail + KID) for all confirmed funds
#   - Downloads NAV series from stooq
#   - Computes absolute and category-relative performance metrics
#   - Uploads fund_performance_YYYYMMDD.csv and fund_ranking_YYYYMMDD.csv to Drive
#
# Schedule: Saturdays at 08:00 Warsaw (06:00 UTC year-round — Warsaw is UTC+1
# in winter and UTC+2 in summer; 06:00 UTC is 07:00 or 08:00 Warsaw, safely
# after Friday NAV data is available on stooq).
#
# Required secrets:
#   GOOGLE_CREDENTIALS   — service account JSON
#   GDRIVE_FOLDER_ID     — Drive folder containing input and output files
#
# Input files expected in the Drive folder (in priority order):
#   knf_stooq_confirmed.csv  — manually reviewed match list (authoritative)
#   knf_stooq_matches.csv    — raw matcher output (fallback; exact/partial only)
#
# Output files written to the same Drive folder:
#   fund_performance_YYYYMMDD.csv  — full metrics table (all funds, all windows)
#   fund_ranking_YYYYMMDD.csv      — within-category IR rankings

name: Fund Performance Comparison

on:
  schedule:
    # Saturdays 06:00 UTC = 07:00 Warsaw winter / 08:00 Warsaw summer
    - cron: "0 6 * * 6"
  workflow_dispatch:
    inputs:
      min_history_days:
        description: "Minimum NAV history required to include a fund (default 252)"
        required: false
        default: "252"
      stooq_delay_min:
        description: "Min seconds between stooq requests (default 0.5)"
        required: false
        default: "0.5"
      stooq_delay_max:
        description: "Max seconds between stooq requests (default 1.5)"
        required: false
        default: "1.5"
      knf_api_retries:
        description: "KNF API retries per request (default 3)"
        required: false
        default: "3"

jobs:
  performance:
    name: Compute fund performance within categories
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy requests google-auth google-api-python-client yfinance

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/credentials.json

      - name: Validate credentials
        run: |
          python -c "import json; json.load(open('/tmp/credentials.json'))" \
            && echo "Credentials JSON is valid."

      - name: Run performance script
        env:
          GDRIVE_FOLDER_ID:  ${{ secrets.GDRIVE_FOLDER_ID }}
          CSV_BASE_URL:      "https://stooq.pl/q/d/l/?s={}.n&i=d"
          # On scheduled runs github.event.inputs is empty — the script's own
          # defaults apply. On manual runs the dispatch inputs override them.
          MIN_HISTORY_DAYS:  ${{ github.event.inputs.min_history_days || '252' }}
          STOOQ_DELAY_MIN:   ${{ github.event.inputs.stooq_delay_min  || '0.5' }}
          STOOQ_DELAY_MAX:   ${{ github.event.inputs.stooq_delay_max  || '1.5' }}
          STOOQ_MAX_RETRIES: "3"
          STOOQ_BACKOFF:     "2.0"
          KNF_API_RETRIES:   ${{ github.event.inputs.knf_api_retries  || '3' }}
          KNF_API_BACKOFF:   "2.0"
          MIN_CATEGORY_PEERS: "3"
        run: |
          python current_development/fund_performance_new.py

      - name: Upload results as workflow artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fund-performance-results
          path: /tmp/fund_perf/*.csv
          retention-days: 30