# .github/workflows/daily_generic_asset.yml
#
# Template workflow for daily monitoring of any single equity index via
# daily_runfile_generic.py.
#
# DEPLOYMENT CHECKLIST
# --------------------
# 1. Copy this file and rename, e.g. daily_sp500.yml
# 2. Change the workflow 'name' field below
# 3. Set OUTPUT_PREFIX (env block, step 5) to match daily_runfile_generic.py
# 4. Adjust the cron schedule to stagger with other daily workflows:
#      WIG20TR single-asset  : 18:00/17:00 UTC  (daily_strategy.yml)
#      Multi-asset            : 18:30/17:30 UTC  (daily_multiasset.yml)
#      Global equity          : 19:00/18:00 UTC  (daily_global_equity.yml)
#      Generic assets         : start at 19:30/18:30, +30min per extra asset
# 5. If ASSET_NAME is a Drive-backed asset (STOXX600, MSCI_World), ensure
#    the raw CSV is uploaded to the Drive folder before the first run.
#
# REQUIRED REPOSITORY SECRETS (shared with all strategy workflows)
# ----------------------------------------------------------------
#   GOOGLE_CREDENTIALS      — service account JSON (raw, pasted as-is)
#   GDRIVE_FOLDER_ID        — target Google Drive folder ID
#   NOTIFY_EMAIL_TO         — recipient address for signal alerts
#   GMAIL_USER              — sender Gmail address
#   GMAIL_APP_PASSWORD      — Gmail App Password
#
# OPTIONAL SECRETS
# ----------------
#   NOTIFY_EMAIL_CC         — CC address

name: Daily SP500 Signal    # <-- change this per asset

on:
  schedule:
    # 19:30 UTC (winter: UTC+1 = 20:30 Warsaw)
    - cron: "30 19 * * 1-5"
    # 18:30 UTC (summer: UTC+2 = 20:30 Warsaw)
    - cron: "30 18 * * 1-5"
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Send email even if action is HOLD"
        required: false
        default: "false"

# Asset-specific env vars — set OUTPUT_PREFIX to match daily_runfile_generic.py
env:
  OUTPUT_PREFIX: "sp500"    # <-- change this per asset

jobs:
  run-generic-asset:
    name: Run strategy and deliver outputs
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6h — walk-forward on 2-core runner is slow

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Python setup
      # ------------------------------------------------------------------
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: dev_single_asset_monitoring/requirements.txt

      # ------------------------------------------------------------------
      # 3. Install dependencies
      # ------------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r dev_single_asset_monitoring/requirements.txt

      # ------------------------------------------------------------------
      # 4. Write Google credentials
      #    Done before the run so build_daily_outputs() can pre-fetch
      #    {PREFIX}_signal_log.csv from Drive for ENTER/EXIT/HOLD.
      # ------------------------------------------------------------------
      - name: Write Google credentials file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/credentials.json

      # ------------------------------------------------------------------
      # 5. Run daily runfile
      #    PYTHONPATH points to the monitoring subfolder so all imports
      #    resolve correctly (strategy_test_library, daily_output, etc.).
      #    GDRIVE_FOLDER_ID is passed so build_daily_outputs() can
      #    pre-fetch the signal log before writing today's row.
      # ------------------------------------------------------------------
      - name: Run generic daily runfile
        id: strategy
        env:
          PYTHONIOENCODING: utf-8
          PYTHONPATH: ${{ github.workspace }}/dev_single_asset_monitoring
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          cd dev_single_asset_monitoring
          python daily_runfile_SP500.py

      # ------------------------------------------------------------------
      # 6. Parse action from snapshot JSON
      #    Reads ACTION and SIGNAL for email subject and conditional send.
      # ------------------------------------------------------------------
      - name: Parse signal action
        id: parse
        run: |
          SNAPSHOT="${{ github.workspace }}/dev_single_asset_monitoring/outputs/${{ env.OUTPUT_PREFIX }}_signal_snapshot.json"

          if [ ! -f "$SNAPSHOT" ]; then
            echo "ERROR: ${{ env.OUTPUT_PREFIX }}_signal_snapshot.json not found."
            echo "  Expected path: $SNAPSHOT"
            exit 1
          fi

          eval "$(python - "$SNAPSHOT" <<'EOF'
          import json, sys
          snap   = json.load(open(sys.argv[1]))
          action = snap.get("action", "HOLD")
          signal = snap.get("signal", "OUT")
          print(f"ACTION={action}")
          print(f"SIGNAL={signal}")
          EOF
          )"

          echo "ACTION=$ACTION"   >> "$GITHUB_ENV"
          echo "SIGNAL=$SIGNAL"   >> "$GITHUB_ENV"
          echo "action=$ACTION"   >> "$GITHUB_OUTPUT"
          echo "signal=$SIGNAL"   >> "$GITHUB_OUTPUT"
          echo "Parsed: signal=$SIGNAL  action=$ACTION"

      # ------------------------------------------------------------------
      # 7. Validate credentials
      # ------------------------------------------------------------------
      - name: Validate credentials JSON
        run: |
          python -c "import json; json.load(open('/tmp/credentials.json'))" \
            && echo "Credentials JSON is valid."

      # ------------------------------------------------------------------
      # 8. Upload outputs to Google Drive
      #    Uploads the four {PREFIX}_* files from outputs/.
      #    Files are created/updated in-place so Drive file IDs stay stable.
      # ------------------------------------------------------------------
      - name: Upload outputs to Google Drive
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python - <<'EOF'
          import json, os
          from pathlib import Path

          creds_dict = json.load(open("/tmp/credentials.json"))
          folder_id  = os.environ["GDRIVE_FOLDER_ID"]
          prefix     = os.environ.get("OUTPUT_PREFIX", "")

          from google.oauth2.service_account import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          SCOPES  = ["https://www.googleapis.com/auth/drive.file"]
          creds   = Credentials.from_service_account_info(creds_dict, scopes=SCOPES)
          service = build("drive", "v3", credentials=creds)

          FILES = [
              (f"{prefix}_signal_status.txt",    "text/plain"),
              (f"{prefix}_signal_log.csv",        "text/csv"),
              (f"{prefix}_equity_chart.png",      "image/png"),
              (f"{prefix}_signal_snapshot.json",  "application/json"),
          ]

          outputs_dir = Path("dev_single_asset_monitoring/outputs")

          for filename, mimetype in FILES:
              path = outputs_dir / filename
              if not path.exists():
                  print(f"SKIP (not found): {filename}", flush=True)
                  continue

              q = (
                  f"name='{filename}' and "
                  f"'{folder_id}' in parents and "
                  f"trashed=false"
              )
              results  = service.files().list(q=q, fields="files(id,name)").execute()
              existing = results.get("files", [])
              media    = MediaFileUpload(str(path), mimetype=mimetype, resumable=True)

              if existing:
                  fid = existing[0]["id"]
                  service.files().update(fileId=fid, media_body=media).execute()
                  print(f"UPDATED {filename} (id={fid})", flush=True)
              else:
                  metadata = {"name": filename, "parents": [folder_id]}
                  service.files().create(
                      body=metadata, media_body=media, fields="id"
                  ).execute()
                  print(f"CREATED {filename}", flush=True)

          print("Drive upload complete.", flush=True)
          EOF

      # ------------------------------------------------------------------
      # 9. Read status text for email body
      # ------------------------------------------------------------------
      - name: Read status text for email body
        if: >
          env.ACTION != 'HOLD' ||
          github.event.inputs.force_notify == 'true'
        run: |
          {
            echo 'STATUS_TEXT<<ENDOFSTATUSTEXT'
            cat "dev_single_asset_monitoring/outputs/${{ env.OUTPUT_PREFIX }}_signal_status.txt"
            echo
            echo ENDOFSTATUSTEXT
          } >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # 10. Send email notification on ENTER or EXIT
      # ------------------------------------------------------------------
      - name: Send signal alert email
        if: >
          env.ACTION != 'HOLD' ||
          github.event.inputs.force_notify == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.GMAIL_USER }}
          password:       ${{ secrets.GMAIL_APP_PASSWORD }}
          subject:        "[${{ env.ACTION }}] ${{ env.OUTPUT_PREFIX }} — ${{ env.SIGNAL }} | ${{ github.run_id }}"
          to:             ${{ secrets.NOTIFY_EMAIL_TO }}
          cc:             ${{ secrets.NOTIFY_EMAIL_CC }}
          from:           "${{ env.OUTPUT_PREFIX }} Strategy <${{ secrets.GMAIL_USER }}>"
          body:           ${{ env.STATUS_TEXT }}
          attachments:    "dev_single_asset_monitoring/outputs/${{ env.OUTPUT_PREFIX }}_equity_chart.png"
          ignore_cert:    false
          convert_markdown: false
          priority:       normal

      # ------------------------------------------------------------------
      # 11. Upload run artefacts to GitHub Actions (30-day retention)
      # ------------------------------------------------------------------
      - name: Upload run artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_PREFIX }}-outputs-${{ github.run_id }}
          path: |
            dev_single_asset_monitoring/outputs/${{ env.OUTPUT_PREFIX }}_signal_status.txt
            dev_single_asset_monitoring/outputs/${{ env.OUTPUT_PREFIX }}_signal_log.csv
            dev_single_asset_monitoring/outputs/${{ env.OUTPUT_PREFIX }}_equity_chart.png
            dev_single_asset_monitoring/outputs/${{ env.OUTPUT_PREFIX }}_signal_snapshot.json
            dev_single_asset_monitoring/${{ env.OUTPUT_PREFIX }}_DailyRun.log
          retention-days: 30

      # ------------------------------------------------------------------
      # 12. Verify that all four expected outputs exist
      # ------------------------------------------------------------------
      - name: Verify outputs
        run: |
          PREFIX="${{ env.OUTPUT_PREFIX }}"
          BASE="dev_single_asset_monitoring/outputs"
          MISSING=0

          for f in \
            "${BASE}/${PREFIX}_signal_snapshot.json" \
            "${BASE}/${PREFIX}_signal_status.txt"    \
            "${BASE}/${PREFIX}_signal_log.csv"       \
            "${BASE}/${PREFIX}_equity_chart.png"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=$((MISSING + 1))
            else
              echo "OK     : $f"
            fi
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: $MISSING output file(s) missing."
            exit 1
          fi
          echo "All outputs present."

      # ------------------------------------------------------------------
      # 13. Credentials cleanup
      # ------------------------------------------------------------------
      - name: Remove credentials file
        if: always()
        run: rm -f /tmp/credentials.json
