name: Weekly KNF Fund Refresh

on:
  schedule:
    # Uruchamia się w każdy piątek o 01:00 UTC
    - cron: '0 1 * * 5'
  workflow_dispatch:  # Pozwala odpalić ręcznie

permissions:
  contents: read

jobs:
  refresh-knf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh KNF Funds & Match
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          # Zapisz credentials
          echo "$GOOGLE_CREDENTIALS" > /tmp/credentials.json
          # Uruchamiamy skrypt za pomocą modułu (flagę --all możesz dodać, jeśli chcesz przeskanować cały rynek)
          python -m moj_system.scripts.refresh_knf --all

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: knf-logs
          path: outputs/refresh_knf.log
